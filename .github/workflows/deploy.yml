name: Docker Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: prod-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - name: backend
            context: ./be
          - name: frontend
            context: ./fe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.name }}
          tags: |
            type=raw,value=${{ github.sha }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & Push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          build-args: |
            BUILDKIT_INLINE_CACHE=1
          platforms: linux/amd64
          no-cache-filter: ""
          no-cache: ${{ matrix.name == 'frontend' && false }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout deploy files
        uses: actions/checkout@v4

      - name: Copy deploy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_PORT }}
          source: deploy/**
          target: /var/www/engrisk-student-management

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        env:
          TAG: ${{ github.sha }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          REGISTRY: ghcr.io
          IMAGE_NAME: ${{ github.repository }}
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_PORT }}
          envs: TAG,DB_USER,DB_PASSWORD,JWT_SECRET,REGISTRY,IMAGE_NAME
          script_stop: true
          script: |
            set -Eeuo pipefail

            show_all_logs() {
              echo "========================================"
              echo "DEPLOYMENT FAILED - Showing all logs"
              echo "========================================"
              cd /var/www/engrisk-student-management
              COMPOSE_FILE="docker-compose.prod.yml"
              [ -f "deploy/docker-compose.prod.yml" ] && COMPOSE_FILE="deploy/docker-compose.prod.yml"

              echo "--- Container Status ---"
              docker ps -a

              echo "--- Backend Logs ---"
              docker compose -f "$COMPOSE_FILE" logs --tail=100 backend 2>&1 || docker logs engrisk-backend --tail=100 2>&1 || echo "No backend logs"

              echo "--- Frontend Logs ---"
              docker compose -f "$COMPOSE_FILE" logs --tail=50 frontend 2>&1 || docker logs engrisk-frontend --tail=50 2>&1 || echo "No frontend logs"

              echo "--- Database Logs ---"
              docker compose -f "$COMPOSE_FILE" logs --tail=30 db 2>&1 || docker logs esm_postgres --tail=30 2>&1 || echo "No db logs"
            }

            trap 'show_all_logs' ERR

            APP_DIR=/var/www/engrisk-student-management
            DOMAIN=msjenny.io.vn

            echo "Using TAG=$TAG, DB_USER=$DB_USER, IMAGE_NAME=$IMAGE_NAME"
            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login "$REGISTRY" -u "${{ github.actor }}" --password-stdin

            umask 177
            cat > .env <<ENV
            TAG=${TAG}
            DOMAIN=${DOMAIN}

            POSTGRES_DB=student_management
            POSTGRES_USER=${DB_USER}
            POSTGRES_PASSWORD=${DB_PASSWORD}
            DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@esm_postgres:5432/student_management

            JWT_SECRET=${JWT_SECRET}
            JWT_EXPIRES_IN=24h

            NODE_ENV=production
            PORT_BE=3001
            FRONTEND_URL=https://${DOMAIN}
            API_PREFIX=api/v1

            PORT_FE=3000
            NEXT_PUBLIC_API_URL=https://${DOMAIN}/api/v1
            ENV

            chmod 600 .env

            COMPOSE_FILE="docker-compose.prod.yml"
            if [ ! -f "$COMPOSE_FILE" ] && [ -f "deploy/docker-compose.prod.yml" ]; then
              COMPOSE_FILE="deploy/docker-compose.prod.yml"
            fi
            echo "Using compose file: $COMPOSE_FILE"

            docker network inspect engrisk-network >/dev/null 2>&1 || docker network create engrisk-network
            docker network inspect proxy >/dev/null 2>&1 || docker network create proxy
            docker volume inspect postgres_data >/dev/null 2>&1 || docker volume create postgres_data
            echo "Network and volume ready"

            if docker ps -a --format '{{.Names}}' | grep -q '^esm_postgres$'; then
              echo "Database container exists, ensuring it's running..."
              docker start esm_postgres || true
              sleep 3
            fi

            echo "Removing old app containers..."
            docker compose -f "$COMPOSE_FILE" --env-file .env rm -sf backend frontend 2>&1 || true

            for container in engrisk-backend engrisk-frontend engrisk-nginx; do
              if docker ps -a --format '{{.Names}}' | grep -q "^${container}$"; then
                echo "Force removing stuck container: $container"
                docker stop "$container" 2>&1 || true
                docker rm -f "$container" 2>&1 || true
              fi
            done
            echo "Old containers removed"

            echo "Pulling new images..."
            docker compose -f "$COMPOSE_FILE" --env-file .env pull backend frontend
            echo "Images pulled"

            echo "Starting containers..."
            docker compose -f "$COMPOSE_FILE" --env-file .env up -d

            echo "Checking container status..."
            docker compose -f "$COMPOSE_FILE" --env-file .env ps

            echo "Waiting for services to be ready..."
            sleep 15

            echo "Testing backend health..."
            MAX_ATTEMPTS=12
            ATTEMPT=1
            while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
              echo "Attempt $ATTEMPT/$MAX_ATTEMPTS..."
              if curl -fsS -k "https://${DOMAIN}/api/v1/health" >/dev/null 2>&1; then
                echo "Backend is healthy"
                break
              fi

              if [ $ATTEMPT -eq $MAX_ATTEMPTS ]; then
                echo "Backend health check failed after $MAX_ATTEMPTS attempts"
                docker compose -f "$COMPOSE_FILE" --env-file .env logs --tail=200 backend
                exit 1
              fi

              sleep 5
              ATTEMPT=$((ATTEMPT + 1))
            done

            echo "Testing frontend..."
            if ! curl -fsS -k "https://${DOMAIN}/" >/dev/null 2>&1; then
              echo "Frontend health check failed"
              docker compose -f "$COMPOSE_FILE" --env-file .env logs --tail=100 frontend
              exit 1
            fi
            echo "Frontend is healthy"

            echo ""
            echo "========================================"
            echo "DEPLOYMENT SUCCESSFUL"
            echo "========================================"
            docker compose -f "$COMPOSE_FILE" --env-file .env ps
            echo ""
            echo "Deployed version: $TAG"
            echo "Site: https://${DOMAIN}"
            echo "API Health: https://${DOMAIN}/api/v1/health"

            echo ""
            echo "Cleaning up old Docker images..."
            docker image prune -af --filter "label!=keep" --filter "until=24h" || true
            echo "Cleanup complete"

      - name: Production Health Check (external)
        run: |
          echo "Final verification from GitHub Actions runner..."
          sleep 10
          echo "Checking API health..."
          curl -f -k https://msjenny.io.vn/api/v1/health
          echo "Checking frontend..."
          curl -f -k https://msjenny.io.vn/
          echo "External health checks passed"
