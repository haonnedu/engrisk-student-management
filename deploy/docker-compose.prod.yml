services:
  db:
    image: postgres:15-alpine
    container_name: esm_postgres
    restart: unless-stopped
    networks:
      - engrisk
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.6"
        reservations:
          memory: 256M
          cpus: "0.2"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  backend:
    image: ghcr.io/${IMAGE_NAME}-backend:${TAG}
    container_name: engrisk-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    networks:
      - engrisk
      - proxy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      NODE_ENV: ${NODE_ENV}
      PORT: ${PORT_BE}
      FRONTEND_URL: ${FRONTEND_URL}
      API_PREFIX: api/v1
      NODE_OPTIONS: "--max-old-space-size=768"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "0.8"
        reservations:
          memory: 512M
          cpus: "0.4"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:${PORT_BE}/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.middlewares.engrisk-https-redirect.redirectscheme.scheme=https
      - traefik.http.middlewares.engrisk-https-redirect.redirectscheme.permanent=true
      - traefik.http.routers.engrisk-api-http.rule=(Host(`msjenny.io.vn`) || Host(`www.msjenny.io.vn`)) && PathPrefix(`/api/`)
      - traefik.http.routers.engrisk-api-http.entrypoints=web
      - traefik.http.routers.engrisk-api-http.middlewares=engrisk-https-redirect
      - traefik.http.routers.engrisk-api.rule=(Host(`msjenny.io.vn`) || Host(`www.msjenny.io.vn`)) && PathPrefix(`/api/`)
      - traefik.http.routers.engrisk-api.entrypoints=websecure
      - traefik.http.routers.engrisk-api.tls=true
      - traefik.http.routers.engrisk-api.tls.certresolver=letsencrypt
      - traefik.http.routers.engrisk-api.priority=100
      - traefik.http.routers.engrisk-api.service=engrisk-api
      - traefik.http.services.engrisk-api.loadbalancer.server.port=3001
    command: ["node", "dist/main.js"]

  frontend:
    image: ghcr.io/${IMAGE_NAME}-frontend:${TAG}
    container_name: engrisk-frontend
    restart: unless-stopped
    networks:
      - engrisk
      - proxy
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: 3000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NODE_OPTIONS: "--max-old-space-size=512"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 512M
          cpus: "0.5"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.middlewares.engrisk-https-redirect.redirectscheme.scheme=https
      - traefik.http.middlewares.engrisk-https-redirect.redirectscheme.permanent=true
      - traefik.http.routers.engrisk-web-http.rule=(Host(`msjenny.io.vn`) || Host(`www.msjenny.io.vn`)) && !PathPrefix(`/api/`)
      - traefik.http.routers.engrisk-web-http.entrypoints=web
      - traefik.http.routers.engrisk-web-http.middlewares=engrisk-https-redirect
      - traefik.http.routers.engrisk-web-http.service=engrisk-web
      - traefik.http.routers.engrisk-web.rule=(Host(`msjenny.io.vn`) || Host(`www.msjenny.io.vn`)) && !PathPrefix(`/api/`)
      - traefik.http.routers.engrisk-web.entrypoints=websecure
      - traefik.http.routers.engrisk-web.tls=true
      - traefik.http.routers.engrisk-web.tls.certresolver=letsencrypt
      - traefik.http.routers.engrisk-web.priority=1
      - traefik.http.routers.engrisk-web.service=engrisk-web
      - traefik.http.services.engrisk-web.loadbalancer.server.port=3000
      - traefik.http.middlewares.engrisk-https-redirect.redirectscheme.scheme=https
      - traefik.http.middlewares.engrisk-https-redirect.redirectscheme.permanent=true

networks:
  engrisk:
    name: engrisk-network
    external: true
  proxy:
    external: true

volumes:
  postgres_data:
    name: postgres_data
    external: true
